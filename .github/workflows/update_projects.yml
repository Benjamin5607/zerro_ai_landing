name: Update GitHub Projects

on:
  schedule:
    - cron: '0 0 * * *' # 매일 자정(UTC 기준)에 실행
  workflow_dispatch: # 수동으로도 실행 가능하도록 설정

jobs:
  update-projects:
    runs-on: ubuntu-latest
    
    # 워크플로우가 리포지토리 내용을 수정(push)할 수 있도록 권한을 부여합니다.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests groq

      - name: Run update script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python./update_readme.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add index.html
          # 변경사항이 있을 때만 커밋하도록 조건 추가
          if! git diff --staged --quiet; then
            git commit -m "🚀 Auto-update Other Experiments section"
            git push
          else
            echo "No changes to commit."
          fi
